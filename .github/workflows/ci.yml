name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, build, E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gb_speaking_ai_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gb_speaking_ai_ci
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXTAUTH_SECRET: ci-nextauth-secret-for-gb-speaking-ai
      AUTH_SECRET: ci-nextauth-secret-for-gb-speaking-ai
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_NAME: GB Speaking AI
      GROQ_API_KEY: ''
      GEMINI_API_KEY: ''
      OPENAI_API_KEY: ''
      AI_DAILY_USER_TOKEN_LIMIT: 60000
      AI_MONTHLY_USER_TOKEN_LIMIT: 1200000
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Generate Prisma Client
        run: npx prisma generate

      # E2E test cần tài khoản demo, nên CI dùng seed demo (DB throwaway).
      - name: Seed CI database
        run: npm run prisma:seed:demo

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit and API tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
